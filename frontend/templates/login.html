<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Monitor | Restricted Access</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <style>
        body { 
            display: grid; 
            place-items: center; 
            height: 100vh; 
            background: var(--bg); 
            margin: 0;
        }
        .login-card { 
            width: 100%; 
            max-width: 400px; 
            padding: 40px; 
            text-align: center; 
        }
        .brand-icon { 
            display: grid;
            place-items: center;
            width: 60px; 
            height: 60px; 
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-size: 24px; 
            margin: 0 auto 20px; 
        }
    </style>
</head>
<body>
    <div class="glass-card login-card">
        <div class="brand-icon">
            <i class="fas fa-shield-halved"></i>
        </div>
        <h2 style="margin-bottom: 5px;">SOC Monitor</h2>
        <p class="muted" style="margin-bottom: 30px;">Restricted Security Console</p>
        
        {% if error %}
        <div class="alert alert-danger" style="font-size: 14px; padding: 10px;">
            <i class="fas fa-triangle-exclamation"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
            {{ form.hidden_tag() }}
            <div style="text-align: left; margin-bottom: 24px;">
                <label class="form-label" style="font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase;">Admin Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password..." required autofocus>
            </div>
            <button type="submit" class="btn-primary-custom" style="width: 100%;">
                <i class="fas fa-lock"></i> Authenticate
            </button>
        </form>
    </div>
</body>
</html>
