<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
</head>

<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="/" class="brand-lockup">
                <span class="brand-icon">
                    <i class="fas fa-shield-halved"></i>
                </span>
                <span class="brand-copy">
                    <strong>SOC Monitor</strong>
                    <small>Threat Detection</small>
                </span>
            </a>

            <button id="sidebarToggle" class="icon-button" type="button" aria-label="Toggle navigation">
                <i class="fas fa-bars"></i>
            </button>
        </div>

        </div>
        <nav class="nav-section">
            <a href="/" class="{{ 'active' if request.path == '/' else '' }}">
                <i class="fas fa-house"></i>
                <span class="nav-text">Dashboard</span>
            </a>

            <a href="/operations" class="{{ 'active' if request.path == '/operations' else '' }}">
                <i class="fas fa-server"></i>
                <span class="nav-text">Operations</span>
            </a>

            <a href="/alerts" class="{{ 'active' if request.path == '/alerts' else '' }}">
                <i class="fas fa-triangle-exclamation"></i>
                <span class="nav-text">Threat Center</span>
            </a>

            <a href="/analytics" class="{{ 'active' if request.path == '/analytics' else '' }}">
                <i class="fas fa-chart-line"></i>
                <span class="nav-text">Analytics</span>
            </a>

            <a href="/logs" class="{{ 'active' if request.path == '/logs' else '' }}">
                <i class="fas fa-list-check"></i>
                <span class="nav-text">Logs Explorer</span>
            </a>

            <a href="/reports" class="{{ 'active' if request.path == '/reports' else '' }}">
                <i class="fas fa-file-lines"></i>
                <span class="nav-text">Reports</span>
            </a>

            <a href="/settings" class="{{ 'active' if request.path == '/settings' else '' }}">
                <i class="fas fa-gear"></i>
                <span class="nav-text">Settings</span>
            </a>
            
            <div style="margin-top: 40px; border-top: 1px solid rgba(255, 255, 255, 0.08); padding-top: 10px;">
                <a href="/logout" style="color: #ef4444;">
                    <i class="fas fa-right-from-bracket"></i>
                    <span class="nav-text">Sign Out</span>
                </a>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div>
                <p class="eyebrow">Security Operations Platform</p>
                <h1>{% block page_heading %}Threat Detection Center{% endblock %}</h1>
            </div>

            <div class="topbar-actions">
                <div class="status-card" id="globalStatusCard">
                    <span class="status-dot" id="status-dot"></span>
                    <span id="globalStatusLabel">Checking services...</span>
                </div>
            </div>
        </header>

        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>


    <script>
        setInterval(async () => {
            try {
                const res = await fetch("/api/status");
                const data = await res.json();
                
                const statusLabel = document.getElementById("globalStatusLabel");
                const statusDot = document.getElementById("status-dot");
                
                if (statusLabel && statusDot) {
                    if (data.collector_status === "online") {
                        statusLabel.innerText = "Services Online";
                        statusDot.style.backgroundColor = "#22c55e"; // Green
                    } else {
                        statusLabel.innerText = "Collector Offline";
                        statusDot.style.backgroundColor = "#ef4444"; // Red
                    }
                }
            } catch (e) {
                console.log("Status monitor disconnected");
            }
        }, 5000); 
    </script>


</body>

</html>
